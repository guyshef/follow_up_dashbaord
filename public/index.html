<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow-Up Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Property Follow-Up Tracker</h1>
    <button id="btn-add-property" class="btn btn-primary">+ Add Property</button>
  </header>
  <main>
    <div id="table-container"></div>
  </main>

  <!-- Add/Edit Property Modal -->
  <div id="property-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 id="modal-title">Add Property</h2>
      <form id="property-form">
        <input type="hidden" id="form-id">
        <label>Property Address<input type="text" id="form-address" required></label>
        <label>Your Email<input type="email" id="form-email" value="dana.gcy.invest@gmail.com"></label>
        <label>Agent Name<input type="text" id="form-agent-name"></label>
        <label>Agent Email<input type="email" id="form-agent-email"></label>
        <label>Agent Phone<input type="tel" id="form-agent-phone"></label>
        <label>Listing Price<input type="number" id="form-listing-price" min="0"></label>
        <label>Initial Offer<input type="number" id="form-initial-offer" min="0"></label>
        <label>Offer Date<input type="date" id="form-offer-date"></label>
        <label>Seller Response<input type="text" id="form-seller-response" placeholder="checking, closed, accepted..."></label>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/table.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/followup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
